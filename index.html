	<script src="multitrack.js"></script>
	<script>
		var editor = PKAudioEditor.init ('app');
		(function () {
			var attempts = 0;
			function loadDanceStationAudio () {
				var params = new URLSearchParams (window.location.search);
				var audioUrl = params.get ('ds_audio');
				if (!audioUrl) return;
				if (!editor || !editor.engine || !editor.engine.LoadSample) {
					if (++attempts < 20) setTimeout (loadDanceStationAudio, 250);
					return;
				}
				try {
					editor.engine.LoadSample (audioUrl);
				} catch (error) {
					console.error ('Could not load Dance Station audio asset', error);
				}
			}
			setTimeout (loadDanceStationAudio, 700);
		})();
		(function () {
			function audioBufferToWav (buffer) {
				var channels = buffer.numberOfChannels;
				var sampleRate = buffer.sampleRate;
				var samples = buffer.length;
				var bytesPerSample = 2;
				var blockAlign = channels * bytesPerSample;
				var dataSize = samples * blockAlign;
				var wav = new ArrayBuffer (44 + dataSize);
				var view = new DataView (wav);

				function writeString (offset, value) {
					for (var i = 0; i < value.length; i += 1) {
						view.setUint8 (offset + i, value.charCodeAt (i));
					}
				}

				writeString (0, 'RIFF');
				view.setUint32 (4, 36 + dataSize, true);
				writeString (8, 'WAVE');
				writeString (12, 'fmt ');
				view.setUint32 (16, 16, true);
				view.setUint16 (20, 1, true);
				view.setUint16 (22, channels, true);
				view.setUint32 (24, sampleRate, true);
				view.setUint32 (28, sampleRate * blockAlign, true);
				view.setUint16 (32, blockAlign, true);
				view.setUint16 (34, 16, true);
				writeString (36, 'data');
				view.setUint32 (40, dataSize, true);

				var offset = 44;
				for (var i = 0; i < samples; i += 1) {
					for (var channel = 0; channel < channels; channel += 1) {
						var value = buffer.getChannelData (channel)[i];
						value = Math.max (-1, Math.min (1, value));
						view.setInt16 (offset, value < 0 ? value * 0x8000 : value * 0x7fff, true);
						offset += bytesPerSample;
					}
				}
				return wav;
			}

			function currentBuffer () {
				if (!editor || !editor.engine || !editor.engine.wavesurfer) return null;
				return editor.engine.wavesurfer.backend && editor.engine.wavesurfer.backend.buffer;
			}

			window.addEventListener ('message', function (event) {
				var message = event.data || {};
				if (message.type !== 'dance-station-export-audio') return;
				try {
					var buffer = currentBuffer ();
					if (!buffer) throw new Error ('No audio is loaded in the editor.');
					var wav = audioBufferToWav (buffer);
					event.source.postMessage ({
						type: 'dance-station-export-audio-result',
						requestId: message.requestId,
						ok: true,
						audio: wav,
						name: message.name || 'dance-station-edit.wav',
						mimeType: 'audio/wav',
						duration: buffer.duration,
						sampleRate: buffer.sampleRate,
						channels: buffer.numberOfChannels
					}, event.origin, [wav]);
				} catch (error) {
					event.source.postMessage ({
						type: 'dance-station-export-audio-result',
						requestId: message.requestId,
						ok: false,
						error: error && error.message ? error.message : String (error)
					}, event.origin);
				}
			});
		})();
		if ('serviceWorker' in navigator) {
			try {
			//	navigator.serviceWorker.register( 'sw.js' );
			} catch ( error ) {}
		}
	</script>
